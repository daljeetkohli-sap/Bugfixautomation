name: Daily agent proposal

on:
  schedule:
    - cron: "15 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-agent-propose
  cancel-in-progress: false

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate daily report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;

            const repoResp = await github.rest.repos.get({ owner, repo });
            const now = new Date().toISOString();

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', per_page: 100
            });

            const openIssues = issues.filter(i => !i.pull_request).length;
            const openPRs = issues.filter(i => i.pull_request).length;

            const report = [
              `# Daily report (${now})`,
              ``,
              `- Repo: ${owner}/${repo}`,
              `- Default branch: ${repoResp.data.default_branch}`,
              `- Stars: ${repoResp.data.stargazers_count}`,
              `- Forks: ${repoResp.data.forks_count}`,
              `- Open issues: ${openIssues}`,
              `- Open PRs: ${openPRs}`,
              ``
            ].join('\n');

            fs.writeFileSync('DAILY_REPORT.md', report, 'utf8');

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: agent/daily
          title: "Daily agent proposal"
          commit-message: "chore(agent): daily report"
          body: |
            Comment **`/approve`** on this PR to auto-merge (checks must be green).
          labels: |
            automation
            agent
